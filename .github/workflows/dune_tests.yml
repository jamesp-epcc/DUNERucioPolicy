name: dune-tests
run-name: DUNE Rucio tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DUNERucioPolicy
        uses: actions/checkout@v7
        with:
          path: DUNERucioPolicy
      - name: Checkout Rucio
        uses: actions/checkout@v7
        with:
          repository: rucio/rucio
          path: rucio
      - name: Add MetaCat container
        shell: bash
        run: |
          COMPOSE_FILENAME=$GITHUB_WORKSPACE/rucio/etc/docker/dev/docker-compose.yml
          NEW_COMPOSE_FILENAME=docker-compose.yml

          # copy all the lines up to and including 'services:'
          sed '/services:/q' $COMPOSE_FILENAME > NEW_COMPOSE_FILENAME

          # add our MetaCat container lines
          echo '  metacat:' >> $NEW_COMPOSE_FILENAME
          echo '    image: docker.io/jamespepcc/metacat_test' >> $NEW_COMPOSE_FILENAME
          echo '    ports:' >> $NEW_COMPOSE_FILENAME
          echo '      - "127.0.0.1:8000:8080"' >> $NEW_COMPOSE_FILENAME

          # copy all the lines after 'services:' from the original file
          sed -e '1,/services:/ d' $COMPOSE_FILENAME >> $NEW_COMPOSE_FILENAME

          echo 'Modified compose file:'
          cat $NEW_COMPOSE_FILENAME

          # copy the new file into place
          cp $NEW_COMPOSE_FILENAME $COMPOSE_FILENAME
      - name: Start Rucio containers
        shell: bash
        run: docker compose -f $GITHUB_WORKSPACE/rucio/etc/docker/dev/docker-compose.yml --profile storage up -d
      - name: Initialise tests in container
        shell: bash
        run: docker exec -t dev-rucio-1 tools/run_tests.sh -ir
      - name: Stop containers
        shell: bash
        run: docker compose -f $GITHUB_WORKSPACE/rucio/etc/docker/dev/docker-compose.yml --profile storage down
